<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BS Swim Analysis Tracker — Kurulum</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#050e1f,#0a1628,#0d1f3c);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:36px 32px;max-width:440px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,0.4)}
.logo{text-align:center;margin-bottom:24px}
.logo-img{width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 12px;display:block;box-shadow:0 0 32px rgba(0,200,255,0.3)}
.logo-fallback{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#050e1f,#1a5fad);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#00c8ff;box-shadow:0 0 32px rgba(0,200,255,0.3)}
.brand{font-size:12px;font-weight:800;color:#0a1628;letter-spacing:.02em}
.brand span{color:#00c8ff}
.sub{font-size:10px;color:#64748b;letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
h1{font-size:17px;font-weight:700;color:#0a1628;margin-bottom:6px}
p{font-size:12px;color:#64748b;margin-bottom:16px;line-height:1.5}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
label{font-size:11px;font-weight:600;color:#475569}
input{border:1px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;outline:none;transition:border .15s;font-family:inherit}
input:focus{border-color:#00c8ff;box-shadow:0 0 0 3px rgba(0,200,255,0.1)}
button{width:100%;padding:12px;background:linear-gradient(135deg,#0a1628,#1a3a6e);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;margin-top:4px}
button:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(10,22,40,0.35)}
button:disabled{opacity:.6;transform:none;cursor:not-allowed}
.msg{padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none;line-height:1.5}
.msg.show{display:block}
.msg.ok{background:#f0fdf4;border:1px solid #10b981;color:#065f46}
.msg.err{background:#fef2f2;border:1px solid #ef4444;color:#991b1b}
.warn{background:#fff8e6;border:1px solid #f59e0b;border-radius:8px;padding:10px 12px;font-size:11px;color:#92400e;margin-bottom:14px;line-height:1.5}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="logo.png" alt="BS" class="logo-img" onerror="this.style.display='none';document.getElementById('lf').style.display='flex'">
    <div class="logo-fallback" id="lf" style="display:none">BS</div>
    <div class="brand">BS <span>BIOMECHANICS</span> SPORTS</div>
    <div class="sub">Swim Analysis Tracker</div>
  </div>
  <h1>Süper Admin Kurulumu</h1>
  <p>Bu sayfa yalnızca bir kez kullanılır. Hesap oluşturulduktan sonra bu sayfayı silin veya erişimi kısıtlayın.</p>
  <div class="warn">⚠️ Bu işlem geri alınamaz. Girdiğiniz bilgilerle sisteme giriş yapacaksınız.</div>
  <div class="msg" id="msg"></div>
  <div class="field"><label>Ad Soyad *</label><input id="name" placeholder="Burçin SAKALLAR"></div>
  <div class="field"><label>Unvan</label><input id="title" placeholder="Biyomekanik Analiz Uzmanı"></div>
  <div class="field"><label>E-posta *</label><input type="email" id="email" placeholder="burcin@bsbiomechanics.com"></div>
  <div class="field"><label>Şifre * (en az 8 karakter)</label><input type="password" id="pw" placeholder="Güçlü bir şifre belirleyin"></div>
  <div class="field"><label>Şifre Tekrar *</label><input type="password" id="pw2" placeholder="Şifreyi tekrar girin" onkeydown="if(event.key==='Enter')createAdmin()"></div>
  <button onclick="createAdmin()" id="btn">Süper Admin Hesabını Oluştur</button>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyDW05O3pjF_FjcMAzcMKUCtyq4PbiJBUdc",
  authDomain: "bs-swim-analysis.firebaseapp.com",
  projectId: "bs-swim-analysis",
  storageBucket: "bs-swim-analysis.firebasestorage.app",
  messagingSenderId: "990059091852",
  appId: "1:990059091852:web:83094b9437ef53fcd068a9"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
window.createAdmin = async function() {
  const name=document.getElementById('name').value.trim();
  const title=document.getElementById('title').value.trim();
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const pw2=document.getElementById('pw2').value;
  const btn=document.getElementById('btn');
  if(!name){showMsg('Ad Soyad zorunlu!','err');return;}
  if(!email){showMsg('E-posta zorunlu!','err');return;}
  if(!pw||pw.length<8){showMsg('Şifre en az 8 karakter olmalı!','err');return;}
  if(pw!==pw2){showMsg('Şifreler eşleşmiyor!','err');return;}
  btn.disabled=true; btn.textContent='Oluşturuluyor...';
  try {
    const cred=await createUserWithEmailAndPassword(auth,email,pw);
    await setDoc(doc(db,'users',cred.user.uid),{
      id:cred.user.uid, name, title, email,
      role:'superadmin', createdAt:serverTimestamp()
    });
    showMsg('✅ Hesap oluşturuldu! Şimdi index.html\'e giriş yapabilirsiniz.','ok');
    btn.textContent='✓ Tamamlandı';
  } catch(e) {
    btn.disabled=false; btn.textContent='Süper Admin Hesabını Oluştur';
    showMsg('Hata: '+e.message,'err');
  }
};
function showMsg(t,type){const el=document.getElementById('msg');el.textContent=t;el.className=`msg ${type} show`;}
</script>
</body>
</html>
